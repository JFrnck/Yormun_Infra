# Túnel Cloudflare (BLUEPRINT 5.1): la IP de OCI nunca se expone.
# Modo remoto (token): los public hostnames *.yormun.com y *.yormungander.com
# se configuran en Zero Trust apuntando a Traefik (ver runbook, paso 4).
# El token vive en el Secret cloudflared-token (seed en bootstrap).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: yormun
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.7.2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
