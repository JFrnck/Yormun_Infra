# Solo corre en el primer arranque del volumen (docker-entrypoint-initdb.d).
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: yormun
data:
  01-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
  02-infisical-db.sql: |
    CREATE DATABASE infisical OWNER yormun;
