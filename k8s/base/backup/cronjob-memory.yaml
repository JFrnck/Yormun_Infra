# Backup de memory.db (BLUEPRINT 3.3.1/3.5). Monta yormun-core-data
# solo-lectura: no requiere que Yormun_Core exista todavía (Fase 4) —
# dump-memory.sh sale OK si el archivo aún no está (ver ese script).
# Diario 03:20.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-memory
  namespace: yormun
spec:
  schedule: "20 3 * * *"
  timeZone: America/Lima
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
          containers:
            - name: backup-memory
              image: ghcr.io/jfrnck/yormun-backup-tools:v1
              command: ["bash", "/scripts/dump-memory.sh"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: MEMORY_DB_PATH
                  value: /data/memory/memory.db
                - name: AGE_RECIPIENT_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: age-backup-key
                      key: public-key
                - name: R2_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: r2-credentials
                      key: account-id
                - name: R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: r2-credentials
                      key: access-key-id
                - name: R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: r2-credentials
                      key: secret-access-key
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: r2-credentials
                      key: bucket
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: core-data
                  mountPath: /data/memory
                  readOnly: true
          volumes:
            - name: core-data
              persistentVolumeClaim:
                claimName: yormun-core-data
                readOnly: true
