# Defaults y máximos por contenedor según AGENTS.md 4.4:
# default 512Mi/500m, máximo 2Gi/1500m, limits.memory ≤ 3× requests.memory.
apiVersion: v1
kind: LimitRange
metadata:
  name: agents-sandbox-limits
  namespace: agents-sandbox
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "1500m"
        memory: 2Gi
      maxLimitRequestRatio:
        memory: "3"
