# ServiceAccount del Deployment de yormun-executor (BLUEPRINT 4.2).
# Vive en su propio namespace; los permisos que necesita (Role de
# abajo) están en agents-sandbox, no aquí — un ServiceAccount puede
# ser sujeto de un RoleBinding en cualquier namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: executor
  namespace: yormun-executor
